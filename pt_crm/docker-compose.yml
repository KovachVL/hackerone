services:
  backend:
    build: ./backend
    ports:
      - "8000:3001"
    volumes:
      - ./backend/app:/app/app
      - pt_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - H1_GRAPHQL_URL=#{H1_GRAPHQL_URL}
      - S3_ENDPOINT=#{S3_ENDPOINT}
      - S3_ACCESS_KEY=#{S3_ACCESS_KEY}
      - S3_SECRET_KEY=#{S3_SECRET_KEY}
      - PUBLIC_S3_ENDPOINT=#{PUBLIC_S3_ENDPOINT}
      - OLLAMA_HOST=#{OLLAMA_HOST}
      - OLLAMA_MODEL=#{OLLAMA_MODEL}
    depends_on:
      - minio

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

volumes:
  pt_data:
  minio_data:
  ollama_data:
